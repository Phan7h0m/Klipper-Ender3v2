# This file contains pin mappings for the stock 2020 Creality Ender 3
# V2. To use this config, during "make menuconfig" select the
# STM32F103 with a "28KiB bootloader" and serial (on USART1 PA10/PA9)
# communication.

# If you prefer a direct serial connection, in "make menuconfig"
# select "Enable extra low-level configuration options" and select
# serial (on USART3 PB11/PB10), which is broken out on the 10 pin IDC
# cable used for the LCD module as follows:
# 3: Tx, 4: Rx, 9: GND, 10: VCC

# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The firmware
# filename must end in ".bin" and must not match the last filename
# that was flashed.

# See docs/Config_Reference.md for a description of parameters.

[include mainsail.cfg]
[include timelapse.cfg]
[include moonraker_obico_macros.cfg]
[include shell_command.cfg]
#[include KAMP_Settings.cfg]
[exclude_object]

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop #^PA7
#position_endstop: 0.0
position_max: 250
position_min: -3

[bltouch]
sensor_pin: ^PB1
control_pin: PB0
x_offset: -45.0
y_offset: -10
#z_offset: 1.460
samples: 1
speed: 2

[safe_z_home]
home_xy_position: 117.5,117.5 # Change coordinates to the center of your print bed
speed: 50
z_hop: 10                 # Move up 10mm z_hop_speed: 5
z_hop_speed: 5

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 15,15
mesh_max: 188, 191
probe_count: 5,5
mesh_pps: 2,2 #number of points to interpret between each probing point
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0

#[screws_tilt_adjust]
#screw1_name: front left screw
#screw1: 70.5,37.5
#screw2_name: front right screw
#screw2: 230.5,37.5
#screw3_name: rear right screw
#screw3: 230.5,207.5
#screw4_name: rear left screw
#screw4: 70.5,207.5
#horizontal_move_z: 10
#speed: 250
#screw_thread: CW-M4

[extruder]
max_extrude_only_distance: 100.0
step_pin: PB4
dir_pin: PB3 #!E_DIR_PIN or E_DIR_PIN
enable_pin: !PC3
microsteps: 16
gear_ratio: 3:1
rotation_distance: 7.8 #8.0
nozzle_diameter: 0.400
full_steps_per_rotation: 200
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
#control: pid
# tuned for MicroSwiss NG @ 210 degrees celcius
#pid_kp = 25.415
#pid_ki = 1.284
#pid_kd = 125.806
min_temp: 0
max_temp: 300
#pressure_advance: 0.32

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
# tuned for stock hardware with 60 degree Celsius target
#pid_Kp= 70.595 
#pid_Ki= 1.188
#pid_Kd= 1048.343
min_temp: 0
max_temp: 130

[fan]
pin: PA0

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 4000
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5.0

[input_shaper]
shaper_freq_x: 38.46 #@ 4000 accel
shaper_type_x: mzv
shaper_freq_y: 40 #@ 4000 accel
shaper_type_y: mzv

[gcode_macro SET_ACTIVE_SPOOL]
gcode:
  {% if params.ID %}
    {% set id = params.ID|int %}
    {action_call_remote_method(
       "spoolman_set_active_spool",
       spool_id=id
    )}
  {% else %}
    {action_respond_info("Parameter 'ID' is required")}
  {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
gcode:
  {action_call_remote_method(
    "spoolman_set_active_spool",
    spool_id=None
  )}

